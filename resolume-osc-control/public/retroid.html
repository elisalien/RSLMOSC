<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08080e">
<title>RSLM — Retroid</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080e;--bg2:#0e0e16;--bg3:#161622;--bg4:#1e1e30;--brd:#222240;--tx:#d4d4e8;--dim:#6a6a88;
  --cyan:#00d4ee;--vio:#a44aff;--rose:#ff2080;--grn:#00e878;--red:#ff2848;--r:8px}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'DM Sans',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
.app{display:flex;flex-direction:column;height:100%;padding:8px;gap:4px}

/* Header */
.hdr{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-bottom:4px}
.logo{font-size:11px;font-weight:700;flex:1;background:linear-gradient(90deg,var(--cyan),var(--vio));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);transition:.3s}.dot.on{background:var(--grn)}
.gps{font-size:8px;color:var(--dim);padding:2px 5px;border-radius:3px;background:var(--bg3)}.gps.on{color:var(--grn)}
.back{width:24px;height:24px;border-radius:5px;border:1px solid var(--brd);background:var(--bg2);color:var(--dim);font-size:12px;
  display:flex;align-items:center;justify-content:center;text-decoration:none}

/* Gamepad layout */
.pad{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;overflow:hidden}

/* Shoulders row */
.shoulders{display:flex;justify-content:space-between;padding:0 6px}
.sh{display:flex;gap:4px}

/* Button base */
.btn{
  background:var(--bg2);border:1.5px solid var(--brd);border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:4px 3px;min-width:40px;min-height:36px;transition:.12s;--c:var(--cyan)
}
.btn .key{font-size:8px;font-weight:700;color:var(--dim);letter-spacing:.3px}
.btn .lbl{font-size:7px;color:var(--dim);text-align:center;line-height:1.15;word-break:break-word}
.btn.on{border-color:var(--c);box-shadow:0 0 10px var(--c)}
.btn.on .key,.btn.on .lbl{color:var(--c)}
.btn.press:not(.on){background:var(--bg3)}
.btn.empty{opacity:.2;border-style:dashed}

/* Main row: dpad + mid + face */
.main{display:flex;justify-content:space-between;align-items:center;padding:0 6px}

/* Cross layout (dpad & face) */
.cross{display:grid;grid-template-areas:". u ." "l . r" ". d .";
  grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:132px;height:132px;gap:3px}
.cross .btn{min-width:0;min-height:0;padding:3px 2px}
.c-u{grid-area:u}.c-l{grid-area:l}.c-r{grid-area:r}.c-d{grid-area:d}

/* Center select/start */
.mid{display:flex;flex-direction:column;gap:4px;align-items:center}
.mid .btn{min-width:36px;min-height:28px;padding:3px 2px}

/* Sticks row */
.sticks{display:flex;justify-content:space-around;padding:0 16px}
.stick{display:flex;flex-direction:column;align-items:center;gap:5px}
.ring{width:60px;height:60px;border-radius:50%;border:1.5px solid var(--brd);background:var(--bg2);position:relative}
.nub{width:20px;height:20px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--brd);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .04s linear}
.ring.active{border-color:var(--cyan)}
.ring.active .nub{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.s-param{font-size:9px;font-weight:600;color:var(--cyan)}
.s-val{font-size:12px;font-weight:700;color:var(--tx)}
.s-btn{min-width:32px;min-height:22px;padding:2px}
.s-btn .key{font-size:7px}

/* Footer */
.drow{display:flex;gap:6px;flex-shrink:0}
.dbtn{flex:1;height:38px;border-radius:var(--r);border:1.5px solid var(--red);background:transparent;
  color:var(--red);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.dbtn:active{background:var(--red);color:#fff}
.dbtn.rest{border-color:var(--grn);color:var(--grn)}.dbtn.rest:active{background:var(--grn);color:var(--bg)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">RSLM RETROID</div>
    <div class="gps" id="gps">No gamepad</div>
    <div class="dot" id="dot"></div>
    <a class="back" href="/">&#8592;</a>
  </div>

  <div class="pad">
    <!-- Shoulders: L2 L1 ... R1 R2 -->
    <div class="shoulders">
      <div class="sh">
        <div class="btn empty" id="b6"><span class="key">L2</span><span class="lbl" id="lbl6"></span></div>
        <div class="btn empty" id="b4"><span class="key">L1</span><span class="lbl" id="lbl4"></span></div>
      </div>
      <div class="sh">
        <div class="btn empty" id="b5"><span class="key">R1</span><span class="lbl" id="lbl5"></span></div>
        <div class="btn empty" id="b7"><span class="key">R2</span><span class="lbl" id="lbl7"></span></div>
      </div>
    </div>

    <!-- D-pad + Select/Start + ABXY -->
    <div class="main">
      <!-- D-pad -->
      <div class="cross">
        <div class="btn c-u empty" id="b12"><span class="key">&#8593;</span><span class="lbl" id="lbl12"></span></div>
        <div class="btn c-l empty" id="b14"><span class="key">&#8592;</span><span class="lbl" id="lbl14"></span></div>
        <div class="btn c-r empty" id="b15"><span class="key">&#8594;</span><span class="lbl" id="lbl15"></span></div>
        <div class="btn c-d empty" id="b13"><span class="key">&#8595;</span><span class="lbl" id="lbl13"></span></div>
      </div>
      <!-- Center -->
      <div class="mid">
        <div class="btn empty" id="b8"><span class="key">SEL</span><span class="lbl" id="lbl8"></span></div>
        <div class="btn empty" id="b9"><span class="key">START</span><span class="lbl" id="lbl9"></span></div>
      </div>
      <!-- Face buttons: standard gamepad positions -->
      <div class="cross">
        <div class="btn c-u empty" id="b3"><span class="key">Y</span><span class="lbl" id="lbl3"></span></div>
        <div class="btn c-l empty" id="b2"><span class="key">X</span><span class="lbl" id="lbl2"></span></div>
        <div class="btn c-r empty" id="b1"><span class="key">B</span><span class="lbl" id="lbl1"></span></div>
        <div class="btn c-d empty" id="b0"><span class="key">A</span><span class="lbl" id="lbl0"></span></div>
      </div>
    </div>

    <!-- Analog sticks -->
    <div class="sticks">
      <div class="stick">
        <div class="ring" id="ring-l"><div class="nub" id="nub-l"></div></div>
        <div class="s-param" id="lbl-ls">&mdash;</div>
        <div class="s-val" id="val-l">&mdash;</div>
        <div class="btn s-btn empty" id="b10"><span class="key">L3</span><span class="lbl" id="lbl10"></span></div>
      </div>
      <div class="stick">
        <div class="ring" id="ring-r"><div class="nub" id="nub-r"></div></div>
        <div class="s-param" id="lbl-rs">&mdash;</div>
        <div class="s-val" id="val-r">&mdash;</div>
        <div class="btn s-btn empty" id="b11"><span class="key">R3</span><span class="lbl" id="lbl11"></span></div>
      </div>
    </div>
  </div>

  <div class="drow">
    <button class="dbtn" onclick="osc('/composition/video/opacity',0)">BLACKOUT</button>
    <button class="dbtn rest" onclick="osc('/composition/video/opacity',1)">RESTORE</button>
  </div>
</div>
<script>
let C,ws,reconn=null,togSt={},prevBtns=[],faderIs=[];

async function init(){
  try{C=await(await fetch('/api/config')).json();}catch{C={layers:[],groups:[],fx:[]};}
  const ctrls=[];
  C.fx.filter(f=>f.type==='toggle').forEach(fx=>{
    fx.routes.forEach(r=>{const g=C.groups.find(x=>x.id===r.gid);
      ctrls.push({type:'toggle',id:`${fx.id}-${r.gid}`,label:`${fx.label} ${g?.name||''}`,
        color:g?.color||'#00d4ee',addr:r.addr,smooth:fx.smooth,dur:fx.smoothDuration||500});
    });});
  C.layers.slice(0,4).forEach((ly,i)=>{ctrls.push({type:'fader',id:`ly-${i}`,label:ly.label,addr:ly.addr});});
  C._retCtrls=ctrls;

  // Fill button labels — only toggles show on buttons (faders are stick-controlled)
  ctrls.forEach((c,i)=>{
    if(c.type!=='toggle')return;
    const el=document.getElementById('b'+i);
    const lbl=document.getElementById('lbl'+i);
    if(el){el.classList.remove('empty');el.style.setProperty('--c',c.color);}
    if(lbl)lbl.textContent=c.label;
  });

  // Map first two faders to sticks
  faderIs=ctrls.map((c,i)=>c.type==='fader'?i:-1).filter(i=>i>=0);
  if(faderIs[0]!==undefined)document.getElementById('lbl-ls').textContent=ctrls[faderIs[0]].label;
  if(faderIs[1]!==undefined)document.getElementById('lbl-rs').textContent=ctrls[faderIs[1]].label;

  connectWS();requestAnimationFrame(pollGP);
}

function retTog(ci){const c=C._retCtrls?.[ci];if(!c)return;togSt[c.id]=!togSt[c.id];const on=togSt[c.id];
  const el=document.getElementById('b'+ci);if(el)el.classList.toggle('on',on);
  if(c.smooth)smooth(c.addr,on?0:1,on?1:0,c.dur);else osc(c.addr,on?1:0);}

function retFader(ci,v){const c=C._retCtrls?.[ci];if(!c)return;osc(c.addr,v);}

function updateStick(s,ax,ay,v){
  const nub=document.getElementById('nub-'+s);
  const ring=document.getElementById('ring-'+s);
  const val=document.getElementById('val-'+s);
  if(nub){const o=18;nub.style.transform=`translate(calc(-50% + ${ax*o}px),calc(-50% + ${ay*o}px))`;}
  if(ring)ring.classList.toggle('active',Math.abs(ax)>.12||Math.abs(ay)>.12);
  if(val)val.textContent=Math.round(v*100)+'%';
}

function pollGP(){
  const gps=navigator.getGamepads?.();let gp=null;for(const g of(gps||[]))if(g){gp=g;break;}
  const st=document.getElementById('gps');
  if(gp){
    if(!st.classList.contains('on')){st.classList.add('on');st.textContent=gp.id.slice(0,24);}
    gp.buttons.forEach((b,bi)=>{const p=b.pressed||b.value>.5;
      if(p&&!prevBtns[bi]&&bi<(C._retCtrls||[]).length&&C._retCtrls[bi].type==='toggle')retTog(bi);
      const el=document.getElementById('b'+bi);if(el)el.classList.toggle('press',p);
      prevBtns[bi]=p;});
    if(faderIs[0]!==undefined&&gp.axes?.length>=2){const ax=gp.axes[0],ay=gp.axes[1],v=1-(ay+1)/2;retFader(faderIs[0],v);updateStick('l',ax,ay,v);}
    if(faderIs[1]!==undefined&&gp.axes?.length>=4){const ax=gp.axes[2],ay=gp.axes[3],v=1-(ay+1)/2;retFader(faderIs[1],v);updateStick('r',ax,ay,v);}
  }else if(st.classList.contains('on')){st.classList.remove('on');st.textContent='No gamepad';}
  requestAnimationFrame(pollGP);
}

function connectWS(){ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}`);
  ws.onopen=()=>{document.getElementById('dot').classList.add('on');if(reconn){clearInterval(reconn);reconn=null;}};
  ws.onclose=()=>{document.getElementById('dot').classList.remove('on');if(!reconn)reconn=setInterval(connectWS,2500);};
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>{try{if(JSON.parse(e.data).type==='reload')location.reload();}catch{}};}
function osc(a,v){if(ws?.readyState===1)ws.send(JSON.stringify({type:'osc',address:a,value:v}));}
function smooth(a,f,t,d){if(ws?.readyState===1)ws.send(JSON.stringify({type:'smooth',address:a,from:f,to:t,duration:d}));}
init();
</script>
</body>
</html>
